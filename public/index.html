<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yarchat Fast</title>
  <style>
    body { font-family: Arial; margin:0; background:#111; color:#fff; }
    #chat { height:90vh; overflow-y:auto; padding:10px; }
    #bar { display:flex; }
    input { flex:1; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="message..." />
  <button onclick="send()">Send</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();

const user = prompt("Your name:");

socket.on("connect", () => {
  console.log("connected");
});

socket.on("history", (msgs) => {
  msgs.forEach(add);
});

socket.on("message", (msg) => {
  add(msg);
});

function add(msg){
  document.getElementById("chat").innerHTML +=
    `<div><b>${msg.user}:</b> ${msg.text}</div>`;
}

function send(){
  const input = document.getElementById("msg");
  socket.emit("message", { user, text: input.value });
  input.value = "";
}

document.getElementById("msg").oninput = () => {
  socket.emit("typing", user);
};
</script>

</body>
</html>
