<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0f1e"/>
<title>Yarchat</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<!-- ══ AUTH SCREEN ══════════════════════════════════════════════ -->
<div id="authScreen" class="screen">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
          <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#2ea6ff"/>
        </linearGradient></defs>
        <rect width="60" height="60" rx="18" fill="url(#lg)"/>
        <path d="M12 20h36v4H12zM12 28h22v4H12zM12 36h28v4H12z" fill="white" opacity=".9"/>
        <circle cx="48" cy="36" r="7" fill="#10b981"/>
        <path d="M45 36l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Yarchat</h1>
    <p class="auth-sub">Месенджер для тих, хто цінує швидкість</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">Вхід</button>
      <button class="auth-tab" id="tabReg" onclick="showTab('reg')">Реєстрація</button>
    </div>

    <div id="formLogin">
      <input id="loginUsername" placeholder="Ім'я користувача" autocomplete="username"/>
      <input id="loginPassword" type="password" placeholder="Пароль" autocomplete="current-password"/>
      <button class="btn-primary" onclick="doLogin()">Увійти</button>
    </div>
    <div id="formReg" class="hidden">
      <input id="regUsername" placeholder="Ім'я користувача (3+ символи)" autocomplete="username"/>
      <input id="regDisplayName" placeholder="Ваше ім'я у чаті"/>
      <input id="regPassword" type="password" placeholder="Пароль (4+ символи)" autocomplete="new-password"/>
      <button class="btn-primary" onclick="doRegister()">Зареєструватися</button>
    </div>
    <div id="authError" class="auth-error hidden"></div>
  </div>
</div>

<!-- ══ MAIN APP ══════════════════════════════════════════════════ -->
<div id="appScreen" class="screen hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar-wrap" onclick="openProfile()">
        <div id="myAvatar" class="avatar av36"></div>
        <div class="online-dot"></div>
      </div>
      <div class="search-wrap">
        <input id="searchInput" placeholder="🔍 Пошук або нове повідомлення" oninput="onSearch(this.value)"/>
      </div>
      <button class="icon-btn" title="Новий груповий чат" onclick="openNewGroupModal()">✏️</button>
    </div>
    <div id="searchResults" class="search-results hidden"></div>
    <div id="chatList" class="chat-list"></div>
  </aside>

  <!-- Chat area -->
  <main id="chatArea" class="chat-area">
    <!-- Empty state -->
    <div id="noChatState" class="no-chat">
      <svg width="80" height="80" viewBox="0 0 60 60" fill="none"><defs><linearGradient id="lg2" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#2ea6ff"/></linearGradient></defs><rect width="60" height="60" rx="18" fill="url(#lg2)"/><path d="M12 20h36v4H12zM12 28h22v4H12zM12 36h28v4H12z" fill="white" opacity=".9"/></svg>
      <p>Оберіть чат або знайдіть нового співрозмовника</p>
    </div>

    <div id="chatView" class="hidden">
      <header class="chat-header">
        <button class="icon-btn back-btn" onclick="closeChatMobile()">‹</button>
        <div id="chatHeaderAvatar" class="avatar av40" onclick="openChatInfo()"></div>
        <div class="chat-header-info" onclick="openChatInfo()">
          <div id="chatHeaderName" class="chat-hname"></div>
          <div id="chatHeaderSub" class="chat-hsub"></div>
        </div>
        <div class="header-actions">
          <div id="connBars" class="conn-bars" title="Якість з'єднання">
            <span></span><span></span><span></span><span></span>
          </div>
          <button class="icon-btn" title="Карта зустрічей" onclick="openMap()">🗺️</button>
          <button class="icon-btn" title="Режим економії" id="saveModeBtn" onclick="toggleSaveMode()">🐢</button>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <div id="replyBar" class="reply-bar hidden">
        <div class="reply-content">
          <span class="reply-label">Відповідь на:</span>
          <span id="replyText" class="reply-text"></span>
        </div>
        <button onclick="cancelReply()">✕</button>
      </div>

      <div id="typingBar" class="typing-bar hidden"></div>

      <footer class="composer">
        <button class="icon-btn" onclick="openStickers()" title="Наліпки">😊</button>
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Файл">📎</button>
        <input type="file" id="fileInput" hidden multiple accept="*/*"/>
        <div class="composer-input-wrap">
          <textarea id="msgInput" placeholder="Повідомлення..." rows="1" oninput="onMsgInput(this)" onkeydown="onMsgKey(event)"></textarea>
        </div>
        <button class="icon-btn" id="micBtn" title="Голосове" onmousedown="startRec()" ontouchstart="startRec(event)" onmouseup="stopRec()" ontouchend="stopRec()">🎤</button>
        <button class="send-btn" onclick="sendText()" id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linejoin="round"/></svg>
        </button>
      </footer>

      <div id="recBar" class="rec-bar hidden">
        <span class="rec-dot"></span>
        <span id="recTime">0:00</span>
        <span>Запис... відпусти щоб надіслати</span>
        <button onclick="cancelRec()">✕ Скасувати</button>
      </div>
    </div>
  </main>

</div><!-- /appScreen -->

<!-- ══ MODALS ════════════════════════════════════════════════════ -->

<!-- Profile modal -->
<div id="profileModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>Профіль</h3><button onclick="closeModal('profileModal')">✕</button></div>
    <div class="profile-avatar-wrap">
      <div id="profileAvatar" class="avatar av80"></div>
      <label class="avatar-upload-btn">📷 Змінити фото<input type="file" accept="image/*" onchange="uploadProfileAvatar(this)" hidden/></label>
    </div>
    <input id="profileDisplayName" placeholder="Ваше ім'я"/>
    <input id="profileBio" placeholder="Про себе..."/>
    <div class="profile-username-row">@<span id="profileUsername"></span></div>
    <button class="btn-primary" onclick="saveProfile()">Зберегти</button>
    <button class="btn-danger" onclick="doLogout()">Вийти з акаунту</button>
  </div>
</div>

<!-- Stickers modal -->
<div id="stickersModal" class="modal hidden">
  <div class="modal-box sticker-modal-box">
    <div class="modal-header"><h3>Наліпки</h3><button onclick="closeModal('stickersModal')">✕</button></div>
    <div id="stickerPacks" class="sticker-packs"></div>
    <div class="sticker-creator">
      <h4>+ Створити набір</h4>
      <input id="newPackName" placeholder="Назва набору наліпок"/>
      <button class="btn-sm" onclick="createPack()">Створити</button>
      <div id="packSelector" class="hidden">
        <select id="packSelect"></select>
        <label class="btn-sm">Додати наліпку<input type="file" accept="image/*" onchange="addSticker(this)" hidden/></label>
      </div>
    </div>
  </div>
</div>

<!-- Map modal -->
<div id="mapModal" class="modal hidden">
  <div class="modal-box map-modal-box">
    <div class="modal-header">
      <h3>🗺️ Карта зустрічей</h3>
      <button onclick="closeModal('mapModal')">✕</button>
    </div>
    <div id="mapContainer" style="height:400px;border-radius:12px;overflow:hidden"></div>
    <div class="map-controls">
      <input id="markerTitle" placeholder="Назва зустрічі"/>
      <input id="markerTime" type="datetime-local"/>
      <button class="btn-sm" id="addMarkerBtn" onclick="enableMarkerAdd()">📍 Відмітити місце</button>
      <button class="btn-sm" id="drawBtn" onclick="toggleDraw()">✏️ Малювати</button>
    </div>
    <div id="mapMarkerList" class="map-marker-list"></div>
  </div>
</div>

<!-- New group chat modal -->
<div id="newGroupModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header"><h3>Новий груповий чат</h3><button onclick="closeModal('newGroupModal')">✕</button></div>
    <input id="groupName" placeholder="Назва групи"/>
    <button class="btn-primary" onclick="createGroupChat()">Створити</button>
  </div>
</div>

<!-- Reaction picker -->
<div id="reactionPicker" class="reaction-picker hidden">
  <div class="reaction-emojis"></div>
</div>

<!-- Context menu -->
<div id="ctxMenu" class="ctx-menu hidden">
  <button onclick="ctxReply()">↩ Відповісти</button>
  <button onclick="ctxEdit()">✏️ Редагувати</button>
  <button onclick="ctxDelete()">🗑 Видалити</button>
  <button onclick="ctxReact()">😊 Реакція</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/app.js"></script>
</body>
</html>
